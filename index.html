  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){return e.name==='QuotaExceededError'?'quota':false;}}
};

// ── Supabase client com Auth ─────────────────────────────────────────────
const SB = {
  _jwt: '',
  h(extra){
    return{
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+(this._jwt || SUPABASE_KEY),
      'Content-Type': 'application/json',
      ...extra
    };
  },
  // Auth
  async login(email, password){
    const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const d=await r.json();
    if(d.error||d.error_description)throw new Error(d.error_description||d.message||d.error);
    return d; // {access_token, refresh_token, expires_in}
  },
  async refreshToken(refresh_token){
    const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token})
    });
    const d=await r.json();
    if(d.error||d.error_description)throw new Error(d.error_description||d.message||d.error);
    return d;
  },
  async getUser(){
    const r=await fetch(`${SUPABASE_URL}/auth/v1/user`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+this._jwt}
    });
    if(!r.ok)throw new Error('invalid_session');
    return r.json();
  },
  // Data
  async getAll(table){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&order=updated_at.asc`,{headers:this.h()});
    if(!r.ok)throw new Error('Erro ao carregar: '+(await r.text()));
    return r.json();
  },
  async upsert(table,obj){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
      method:'POST',
      headers:this.h({'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body:JSON.stringify(obj)
    });
    if(!r.ok)throw new Error('Erro ao salvar: '+(await r.text()));
  },
  async del(table,id){
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`,{
      method:'DELETE',headers:this.h()
    });
    if(!r.ok)throw new Error('Erro ao remover: '+(await r.text()));
  }
};

// Session helpers
function saveSession(data){
  const exp=Date.now()+(data.expires_in-60)*1000; // 60s margin
  LS.set('wv_auth',{
    access_token:data.access_token,
    refresh_token:data.refresh_token,
    expires_at:exp
  });
  SB._jwt=data.access_token;
}
function clearSession(){ LS.set('wv_auth',null); SB._jwt=''; }
async function restoreSession(){
  const s=LS.get('wv_auth');
  if(!s)return false;
  if(Date.now()<s.expires_at){
    SB._jwt=s.access_token;
    try{ await SB.getUser(); return true; }catch{ /* fallthrough to refresh */ }
  }
  // Try refresh
  try{
    const d=await SB.refreshToken(s.refresh_token);
    saveSession(d); return true;
  }catch{ clearSession(); return false; }
}

// ── Template logic ───────────────────────────────────────────────────────────
function replBlock(code,name,val){
  const si=code.indexOf('const '+name);if(si<0)return code;
  const bi=code.indexOf('{',si);if(bi<0)return code;
  let d=0,e=bi;
  while(e<code.length){if(code[e]==='{')d++;else if(code[e]==='}'&&--d===0)break;e++;}
  let end=e+1;while(end<code.length&&code[end]===';')end++;
  return code.slice(0,si)+'const '+name+' = '+val+';'+code.slice(end);
}
function generateProcProfUnico(profissionais, procedimentosMap) {
  // Gera mapeamento procedimento→profissional para fallback no Decide pos IA
  const result = {};
  for (const [profName, profData] of Object.entries(profissionais||{})) {
    for (const esp of (profData.especialidades||[])) {
      const keywords = (procedimentosMap||{})[esp] || [esp];
      for (const kw of keywords) {
        if (!result[kw]) result[kw] = profName;
      }
    }
  }
  return result;
}

function applyConfig(t,c){
  const procProfUnico = generateProcProfUnico(c.profissionais, c.procedimentos_map);
  const r={
    'TEMPLATE_CLINICA_NOME':je(c.clinica_nome||''),
    'TEMPLATE_AGENTE_NOME':je(c.agente_nome||''),
    'TEMPLATE_AGENTE_PRONOME':je(c.agente_pronome||'obrigada'),
    'TEMPLATE_TELEFONE_SUPORTE':je(c.telefone_suporte||''),
    'TEMPLATE_EVO_INSTANCE':je(c.evo_instance||''),
    'TEMPLATE_PINECONE_INDEX':je(c.pinecone_index||''),
    'TEMPLATE_CALENDAR_EMAIL':je(c.calendar_email||''),
    'TEMPLATE_SUPABASE_CRED_ID':je(c.supabase_cred_id||''),
    'TEMPLATE_GOOGLE_CAL_CRED_ID':je(c.google_cal_cred_id||''),
    'TEMPLATE_AGENDAMENTO_WORKFLOW_ID':je(c.agendamento_workflow_id||'ATUALIZAR_APOS_IMPORT'),
    'TEMPLATE_PROFISSIONAIS_JS':je(JSON.stringify(c.profissionais||{})),
    'TEMPLATE_PROCEDIMENTOS_MAP_JS':je(JSON.stringify(c.procedimentos_map||{})),
    'TEMPLATE_HORARIO_FUNCIONAMENTO':je(JSON.stringify(c.horario_funcionamento||{})),
    'TEMPLATE_PROC_PROF_UNICO_JS':je(JSON.stringify(procProfUnico)),
    'TEMPLATE_GSHEETS_ID':je(c.gsheets_id||''),
    'TEMPLATE_AGENDAMENTO_WORKFLOW_ID':je(c.agendamento_workflow_id||'ATUALIZAR_APOS_IMPORT'),
  };
  if(c.customConfig)for(const[k,v]of Object.entries(c.customConfig))r['TEMPLATE_'+k]=je(v);
  let res=t;for(const[k,v]of Object.entries(r))res=res.split(k).join(v);
  return res;
}
function applyAgend(t,c){
  let res=applyConfig(t,c);
  try{
    const j=JSON.parse(res);
    const n=j.nodes&&j.nodes.find(x=>x.name==='Normaliza dados');
    if(n&&n.parameters&&n.parameters.jsCode){
      let code=n.parameters.jsCode;
      code=replBlock(code,'PROFISSIONAIS_DEFAULT',JSON.stringify(c.profissionais||{}));
      code=replBlock(code,'PROCEDIMENTOS_MAP',JSON.stringify(c.procedimentos_map||{}));
      n.parameters.jsCode=code;
    }
    return JSON.stringify(j,null,2);
  }catch(err){return res;}
}
function isAgend(k){return k.toLowerCase().includes('agend');}
async function buildZip(nicho,clients,onProg){
  const zip=new JSZip();
  for(let i=0;i<clients.length;i++){
    const c=clients[i];
    onProg(Math.round(i/clients.length*85),'Gerando: '+(c.clinica_nome||'cliente')+'...');
    const folder=zip.folder(sn(c.clinica_nome));
    for(const wf of nicho.workflowFiles){
      const content=nicho.files[wf.key];if(!content)continue;
      const out=isAgend(wf.key)?applyAgend(content,c):applyConfig(content,c);
      const fname=wf.label.toLowerCase().replace(/\s+/g,'_')+'_'+sn(c.clinica_nome)+'.json';
      folder.file(fname,out);
    }
  }
  onProg(90,'Compactando...');
  return zip.generateAsync({type:'blob'},m=>onProg(90+Math.round(m.percent*.09),'Compactando...'));
}
function dlBlob(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

function ProfEditor({name,dados,onUpdate,onRemove}){

  const addEsp=()=>{const t=newEsp.trim().toLowerCase();if(!t||esps.includes(t))return;onUpdate(ln,{...dados,especialidades:[...esps,t]});setNewEsp('');};
  const remEsp=e=>onUpdate(ln,{...dados,especialidades:esps.filter(x=>x!==e)});
  return(
    <div style={{background:C.card2,border:'1px solid '+C.border2,borderRadius:12,marginBottom:8,overflow:'hidden'}}>
      {/* Header row */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',cursor:'pointer',minWidth:0}} onClick={()=>setExp(!exp)}>
        <div style={{width:32,height:32,borderRadius:8,background:C.accent+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>👨‍⚕️</div>
        <input value={ln} onChange={e=>{e.stopPropagation();setLn(e.target.value);}}
          onBlur={()=>onUpdate(ln,dados)} onClick={e=>e.stopPropagation()}
          placeholder="Nome do profissional"
          style={{flex:1,minWidth:0,background:'transparent',border:'none',color:C.text,fontSize:14,fontWeight:700,outline:'none'}}/>
        <span style={{fontSize:11,color:C.muted,flexShrink:0}}>{esps.length} esp.</span>
        <span style={{color:C.muted,flexShrink:0}}>{exp?'▲':'▼'}</span>

          style={{color:C.danger,cursor:'pointer',padding:'3px 8px',borderRadius:6,border:'1px solid '+C.danger+'44',fontSize:12,fontWeight:700,flexShrink:0,lineHeight:1}}>✕</span>
      </div>

          {/* Especialidades adicionadas */}
          <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em',display:'block',margin:'12px 0 8px'}}>Especialidades</label>

                {e}
                <span onClick={()=>remEsp(e)} style={{cursor:'pointer',fontWeight:900,fontSize:15,lineHeight:'1',marginLeft:1}}>×</span>
              </span>
            ))}
          </div>
          {/* Add input */}
          <div style={{display:'flex',gap:6,marginBottom:14}}>
            <input value={newEsp} onChange={e=>setNewEsp(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){addEsp();e.preventDefault();}}}
              placeholder="Digitar e pressionar Enter ou clicar em Add"
              style={{flex:1,minWidth:0,...inpBase(C,false,true)}}/>
            <button onClick={addEsp} disabled={!newEsp.trim()}
              style={{padding:'6px 14px',background:C.accent,color:'#fff',border:'none',borderRadius:9,fontWeight:700,fontSize:12,cursor:'pointer',flexShrink:0,opacity:!newEsp.trim()?.5:1}}>+ Add</button>

          <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:8}}>Horários de Atendimento</label>
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
            <table style={{borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr>
                  <td style={{padding:'2px 6px',color:C.muted,width:50}}></td>

              </thead>

                {PERIODOS.map(p=>(
                  <tr key={p}>
                    <td style={{color:C.text2,fontWeight:600,padding:'4px 6px',whiteSpace:'nowrap'}}>{PL[p]}</td>

                      const h=dados.horarios||{};

  );
}

// ── WF Row ───────────────────────────────────────────────────────────────────
function WFRow({wf,nicho,onUpdate,onRemove,onFile}){
  const{C}=useC();
  const ref=useRef();
  const[showP,setShowP]=useState(false);
  const loaded=!!nicho.files[wf.key];
  const fname=(nicho.fileNames[wf.key]||'').replace(/_TEMPLATE\.json$/i,'').replace(/\.json$/i,'').slice(0,16);
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',background:loaded?C.card2:C.surf,border:'2px solid '+(loaded?C.accent+'55':C.border2),borderRadius:12,marginBottom:7}}>
      {/* Icon picker */}
      <div style={{position:'relative',flexShrink:0}}>
        <span onClick={()=>setShowP(!showP)} title="Trocar ícone" style={{fontSize:20,cursor:'pointer',userSelect:'none',display:'block',lineHeight:1}}>{wf.icon}</span>
        {showP&&(
          <div style={{position:'absolute',top:28,left:0,background:C.card,border:'1px solid '+C.border2,borderRadius:10,padding:8,zIndex:50,display:'flex',flexWrap:'wrap',gap:3,width:170,boxShadow:C.shadow}}>
            {WICO.map(e=><span key={e} onClick={()=>{onUpdate({...wf,icon:e});setShowP(false);}} style={{cursor:'pointer',fontSize:17,padding:4,borderRadius:5,background:wf.icon===e?C.accent+'33':'transparent'}}>{e}</span>)}
          </div>
        )}
      </div>
      {/* Label */}
      <input value={wf.label} onChange={e=>onUpdate({...wf,label:e.target.value})} placeholder="Nome do workflow"
        style={{flex:1,minWidth:0,background:'transparent',border:'none',color:C.text,fontSize:13,fontWeight:700,outline:'none'}}/>
      {/* File select */}
      <div onClick={()=>ref.current.click()}
        style={{cursor:'pointer',padding:'4px 9px',background:loaded?C.success+'22':C.border2,borderRadius:7,display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
        <span style={{fontSize:11,fontWeight:700,color:loaded?C.success:C.muted,whiteSpace:'nowrap'}}>{loaded?'✓ '+fname:'📂'}</span>
      </div>
      {/* Remove */}
      <button onClick={onRemove}
        style={{flexShrink:0,background:'transparent',border:'1px solid '+C.danger+'55',borderRadius:7,color:C.danger,fontWeight:700,fontSize:12,padding:'4px 8px',cursor:'pointer',lineHeight:1}}>✕</button>
      <input ref={ref} type="file" accept=".json" style={{display:'none'}} onChange={e=>{if(e.target.files[0])onFile(wf.key,e.target.files[0]);}}/>
    </div>
  );
}

// ── Nicho Form ────────────────────────────────────────────────────────────────

        <Btn variant="ghost" onClick={onCancel}>Cancelar</Btn>

// ── Generate Tab ──────────────────────────────────────────────────────────────
function GenerateTab({nichos,clients}){
  const{C}=useC();
  const[selId,setSelId]=useState('');
  const[sel,setSel]=useState({});
  const[prog,setProg]=useState(null);
  const[done,setDone]=useState(false);
  const nicho=nichos.find(n=>n.id===selId);
  const nc=clients.filter(c=>c.set_id===selId);
  const allOk=nicho&&nicho.workflowFiles.length>0&&nicho.workflowFiles.every(w=>nicho.files[w.key]);
  const selC=nc.filter(c=>sel[c.id]);
  useEffect(()=>{setSel({});setDone(false);},[selId]);
  const togAll=()=>{const a=nc.every(c=>sel[c.id]);const nx={};nc.forEach(c=>nx[c.id]=!a);setSel(nx);};
  const doGen=async()=>{
    if(!nicho||!selC.length)return;
    setDone(false);setProg({pct:0,msg:'Iniciando...'});
    try{
      const blob=await buildZip(nicho,selC,(pct,msg)=>setProg({pct,msg}));
      dlBlob(blob,'WVortex_'+sn(nicho.nome)+'_'+new Date().toISOString().slice(0,10)+'.zip');
      setProg({pct:100,msg:'ZIP baixado!'});setDone(true);
      setTimeout(()=>setProg(null),4000);
    }catch(e){setProg(null);alert('Erro: '+e.message);}
  };
  return(
    <div>
      <ST>Selecionar Nicho</ST>
      {nichos.length===0&&<div style={{textAlign:'center',padding:50,color:C.muted,fontSize:14,background:C.card2,borderRadius:12}}>📦 Crie um nicho primeiro.</div>}
      <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:16}}>
        {nichos.map(n=>{
          const nc2=clients.filter(c=>c.set_id===n.id).length;
          const lf=n.workflowFiles.filter(w=>n.files[w.key]).length;
          const tot=n.workflowFiles.length;
          return(
            <div key={n.id} onClick={()=>setSelId(n.id)}
              style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:selId===n.id?n.color+'22':C.card2,border:'2px solid '+(selId===n.id?n.color:C.border2),borderRadius:14,cursor:'pointer',transition:'all .2s',flex:'1 1 160px',minWidth:0}}>
              <span style={{fontSize:24,flexShrink:0}}>{n.icon}</span>
              <div style={{minWidth:0}}>
                <p style={{fontWeight:800,fontSize:14,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.nome}</p>
                <p style={{fontSize:11,color:C.muted,marginTop:2}}>{nc2} clientes · {lf===tot&&tot>0?'✅':lf+'/'+tot}</p>
              </div>
              {selId===n.id&&<span style={{color:n.color,fontWeight:900,flexShrink:0}}>✓</span>}
            </div>
          );
        })}
      </div>
      {nicho&&!allOk&&(
        <div style={{background:C.warn+'18',border:'1px solid '+C.warn+'55',borderRadius:12,padding:14,marginBottom:14}}>
          <p style={{fontSize:13,color:C.warn,fontWeight:700,marginBottom:7}}>⚠️ Templates incompletos</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {nicho.workflowFiles.map(w=><span key={w.key} style={{fontSize:12,color:nicho.files[w.key]?C.success:C.warn}}>{nicho.files[w.key]?'✓':'✗'} {w.label}</span>)}
          </div>
          <p style={{fontSize:12,color:C.text2,marginTop:8}}>Nichos → Editar → Workflows → carregar arquivos faltantes.</p>
        </div>
      )}
      {nicho&&allOk&&(
        <div>
          <ST>Selecionar Clientes</ST>
          {nc.length===0&&<div style={{textAlign:'center',padding:30,color:C.muted,fontSize:13,background:C.card2,borderRadius:12}}>Nenhum cliente neste nicho.</div>}
          {nc.length>0&&(
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,padding:'8px 12px',background:C.card2,borderRadius:10}}>
                <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer'}}>
                  <input type="checkbox" checked={nc.every(c=>sel[c.id])&&nc.length>0} onChange={togAll}/>
                  <span style={{fontSize:13,color:C.text2,fontWeight:600}}>{selC.length}/{nc.length} selecionados</span>
                </label>
                {selC.length>0&&<Badge color={nicho.color}>ZIP: {selC.length} pasta(s)</Badge>}
              </div>
              {nc.map(c=>(
                <div key={c.id} onClick={()=>setSel(s=>({...s,[c.id]:!s[c.id]}))}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',marginBottom:5,background:sel[c.id]?nicho.color+'18':C.surf,border:'2px solid '+(sel[c.id]?nicho.color+'55':C.border),borderRadius:12,cursor:'pointer',transition:'all .2s'}}>
                  <input type="checkbox" checked={!!sel[c.id]} onChange={()=>setSel(s=>({...s,[c.id]:!s[c.id]}))} onClick={e=>e.stopPropagation()}/>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:13,fontWeight:700,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.clinica_nome||'Sem nome'}</p>
                    <p style={{fontSize:11,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>📁 {sn(c.clinica_nome)}/</p>
                  </div>
                  {c.evo_instance&&<Badge color={C.text2} bg={C.border2}>{c.evo_instance}</Badge>}
                </div>
              ))}
            </div>
          )}
          {selC.length>0&&(
            <div style={{marginTop:14}}>
              <ST>Gerar ZIP</ST>
              <Card style={{marginBottom:12,background:C.card2}}>
                <p style={{fontSize:12,color:C.muted,marginBottom:10,fontWeight:700}}>📁 Estrutura do ZIP:</p>
                {selC.slice(0,3).map(c=>{const s2=sn(c.clinica_nome);return(
                  <div key={c.id} style={{marginBottom:8}}>
                    <p style={{fontSize:12,fontWeight:700,color:nicho.color}}>📁 {s2}/</p>
                    {nicho.workflowFiles.map(w=><p key={w.key} style={{fontSize:11,color:C.muted,paddingLeft:12,fontFamily:'JetBrains Mono,monospace',marginTop:2}}>├── {w.label.toLowerCase().replace(/\s+/g,'_')}_{s2}.json</p>)}
                  </div>
                );})}
                {selC.length>3&&<p style={{fontSize:11,color:C.muted}}>... +{selC.length-3} pasta(s)</p>}
              </Card>
              {prog&&(
                <div style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:12,color:C.text2}}>{prog.msg}</span>
                    <span style={{fontSize:12,color:nicho.color,fontWeight:800}}>{prog.pct}%</span>
                  </div>
                  <ProgBar pct={prog.pct} color={done?C.success:nicho.color} h={8}/>
                </div>
              )}
              <Btn full variant={done?'success':'primary'} onClick={doGen} disabled={!!(prog&&!done)}>
                {prog&&!done?'⏳ Gerando...':done?'✅ Baixado! Gerar novamente?':'⬇️ Gerar ZIP ('+selC.length+' cliente'+(selC.length>1?'s':'')+')'}
              </Btn>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrBound extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return(
      <div style={{padding:40,fontFamily:'JetBrains Mono,monospace',background:'#0a0010',color:'#f87171',minHeight:'100vh'}}>
        <h2 style={{marginBottom:12}}>❌ Erro na aplicação</h2>
        <pre style={{background:'#1a0020',padding:16,borderRadius:10,fontSize:12,overflow:'auto',color:'#fca5a5'}}>{this.state.err.toString()}</pre>
        <p style={{marginTop:12,color:'#888',fontSize:12}}>Abra o Console (F12) para detalhes.</p>
      </div>
    );
    return this.props.children;
  }
}

// ── Login Screen ─────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const{C}=useC();
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const doLogin=async()=>{
    if(!email.trim()||!pass.trim()){setErr('Preencha e-mail e senha.');return;}
    setLoading(true);setErr('');
    try{ const d=await SB.login(email.trim(),pass); saveSession(d); onLogin(); }
    catch(e){ setErr('Credenciais inválidas. Verifique e-mail e senha.'); }
    setLoading(false);
  };
  const onKey=e=>{if(e.key==='Enter')doLogin();};
  const inp=(type,value,setter,placeholder,autocomplete)=>(
    <input type={type} value={value} onChange={e=>setter(e.target.value)} onKeyDown={onKey}
      placeholder={placeholder} autoComplete={autocomplete}
      style={{width:'100%',background:C.inputBg,border:'1px solid '+C.border2,borderRadius:10,
        padding:'10px 13px',color:C.text,fontSize:14,outline:'none',marginBottom:14,display:'block'}}/>
  );
  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:380}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <img src={C.logo} alt="WVortex" style={{height:38,objectFit:'contain',marginBottom:14}}/>
          <p style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em'}}>Setup v1.0</p>
        </div>
        <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:20,padding:28,boxShadow:C.shadow}}>
          <h2 style={{fontSize:18,fontWeight:900,color:C.text,marginBottom:4}}>Acesso restrito</h2>
          <p style={{fontSize:13,color:C.muted,marginBottom:22}}>Área administrativa WVortex.</p>
          <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:5}}>E-mail</label>
          {inp('email',email,setEmail,'admin@wvortex.com','username')}
          <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:5}}>Senha</label>
          {inp('password',pass,setPass,'••••••••','current-password')}
          {err&&<div style={{background:C.danger+'18',border:'1px solid '+C.danger+'44',borderRadius:8,padding:'10px 12px',marginBottom:16,fontSize:12,color:C.danger}}>{err}</div>}
          <button onClick={doLogin} disabled={loading} style={{
            width:'100%',padding:'12px',
            background:loading?C.border:'linear-gradient(135deg,'+C.accent+','+C.accentD+')',
            color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:15,
            fontFamily:'Inter,sans-serif',cursor:loading?'not-allowed':'pointer',
            boxShadow:loading?'none':'0 4px 16px '+C.accent+'44',transition:'all .2s'
          }}>{loading?'Entrando...':'Entrar →'}</button>
        </div>
      </div>
    </div>
  );
}
// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[theme,setTheme]=useState(()=>LS.get('wv_theme')||'dark');
  const C=theme==='dark'?DARK:LIGHT;
  const[tab,setTab]=useState('nichos');
  const[nichos,setNichos]=useState([]);
  const[clients,setClients]=useState([]);
  const[editN,setEditN]=useState(null);
  const[editC,setEditC]=useState(null);
  const[filterN,setFilterN]=useState('');
  const[loaded,setLoaded]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[syncErr,setSyncErr]=useState('');
  // Auth
  const[authed,setAuthed]=useState(false);
  const[authChecking,setAuthChecking]=useState(true);

  // Check/restore session on load
  useEffect(()=>{
    (async()=>{
      const ok=await restoreSession();
      setAuthed(ok);
      setAuthChecking(false);
    })();
  },[]);

  // Load data when authenticated
  useEffect(()=>{
    if(!authed)return;
    (async()=>{
      setSyncing(true);setSyncErr('');
      try{
        const[nr,cr]=await Promise.all([SB.getAll('wvortex_nichos'),SB.getAll('wvortex_clientes')]);
        setNichos(nr.map(r=>r.data));
        setClients(cr.map(r=>r.data));
      }catch(e){setSyncErr('Erro ao carregar: '+e.message);}
      setSyncing(false);setLoaded(true);
    })();
  },[authed]);

  useEffect(()=>{
    document.body.style.background=C.bg;
    document.body.style.color=C.text;
    LS.set('wv_theme',theme);
  },[theme,C]);

  const saveN=async n=>{
    const i=nichos.findIndex(x=>x.id===n.id);
    const u=i>=0?nichos.map(x=>x.id===n.id?n:x):[...nichos,n];
    setNichos(u); setSyncing(true); setSyncErr('');
    try{ await SB.upsert('wvortex_nichos',{id:n.id,data:n,updated_at:new Date().toISOString()}); }
    catch(e){ setSyncErr('Erro ao salvar nicho: '+e.message); }
    setSyncing(false); setEditN(null);
  };
  const saveC=async c=>{
    const i=clients.findIndex(x=>x.id===c.id);
    const u=i>=0?clients.map(x=>x.id===c.id?c:x):[...clients,c];
    setClients(u); setSyncing(true); setSyncErr('');
    try{ await SB.upsert('wvortex_clientes',{id:c.id,set_id:c.set_id,data:c,updated_at:new Date().toISOString()}); }
    catch(e){ setSyncErr('Erro ao salvar cliente: '+e.message); }
    setSyncing(false); setEditC(null);
  };
  const delN=async id=>{
    if(!confirm('Remover nicho? Clientes vinculados perderão o vínculo.'))return;
    const u=nichos.filter(x=>x.id!==id); setNichos(u); setSyncing(true);
    try{ await SB.del('wvortex_nichos',id); }catch(e){ setSyncErr('Erro: '+e.message); }
    setSyncing(false);
  };
  const delC=async id=>{
    if(!confirm('Remover cliente?'))return;
    const u=clients.filter(x=>x.id!==id); setClients(u); setSyncing(true);
    try{ await SB.del('wvortex_clientes',id); }catch(e){ setSyncErr('Erro: '+e.message); }
    setSyncing(false);
  };
  const logout=()=>{
    if(!confirm('Sair da sessão?'))return;
    clearSession();
    setAuthed(false);setLoaded(false);setNichos([]);setClients([]);
  };

  const goHome=()=>{setEditN(null);setEditC(null);setTab('nichos');};

  // Auth loading — checking session
  if(authChecking) return(
    <TC.Provider value={{C,theme,setTab}}>
      <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <img src={C.logo} alt='WVortex' style={{height:32,opacity:.5,marginBottom:12}}/>
          <p style={{color:C.muted,fontSize:13}}>Verificando sessão...</p>
        </div>
      </div>
    </TC.Provider>
  );

  // Not authenticated — show login
  if(!authed) return(
    <TC.Provider value={{C,theme,setTab}}>
      <style>{`::-webkit-scrollbar-thumb{background:${C.sc}}`}</style>
      <LoginScreen onLogin={()=>setAuthed(true)}/>
    </TC.Provider>
  );
  const filteredClients=clients.filter(c=>!filterN||c.set_id===filterN);

  const NAV=[['nichos','📦','Nichos',nichos.length],['clients','👥','Clientes',clients.length],['generate','⬇️','Gerar ZIP',null]];

  const empty=(icon,title,sub,action)=>(
    <div style={{textAlign:'center',padding:70,background:C.card2,borderRadius:20,border:'1px solid '+C.border}}>
      <div style={{fontSize:50,marginBottom:12}}>{icon}</div>
      <h3 style={{fontSize:17,color:C.text,marginBottom:8}}>{title}</h3>
      {sub&&<p style={{color:C.muted,fontSize:14,marginBottom:action?22:0}}>{sub}</p>}
      {action}
    </div>
  );
  const back=(label,fn)=>(
    <div style={{marginBottom:8}}>
      <button onClick={fn} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13,fontFamily:'Inter,sans-serif',padding:0}}>← {label}</button>
    </div>
  );

  return(
    <TC.Provider value={{C,theme,setTab}}>
      <div style={{minHeight:'100vh',background:C.bg,color:C.text,maxWidth:'100vw',overflowX:'hidden'}}>
        <style>{`::-webkit-scrollbar-thumb{background:${C.sc}}`}</style>

        {/* ─────────────────────────────────────────────────────────────────
            HEADER — row 1: logo + toggle  |  row 2: nav (scrollable)
        ───────────────────────────────────────────────────────────────── */}
        <header style={{background:C.surf,borderBottom:'1px solid '+C.border,position:'sticky',top:0,zIndex:100,boxShadow:C.shadowSm}}>
          {/* Row 1 */}
          <div style={{padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',maxWidth:900,margin:'0 auto',gap:10}}>
            {/* Logo + name — click goes home */}
            <div onClick={goHome} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',userSelect:'none',flexShrink:0}}>
              <img src={C.logo} alt="WVortex" style={{height:28,objectFit:'contain',flexShrink:0}}/>
              <div style={{borderLeft:'1px solid '+C.border2,paddingLeft:10}}>
                <div style={{fontSize:9,fontWeight:800,color:C.muted,textTransform:'uppercase',letterSpacing:'.14em',lineHeight:1}}>Setup v1.0</div>
              </div>
            </div>
            {/* Sync status + right controls */}
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {syncing&&<span style={{fontSize:11,color:C.muted,display:'flex',alignItems:'center',gap:4}}>⏳ Salvando...</span>}
              {syncErr&&<span title={syncErr} style={{fontSize:11,color:C.danger,cursor:'help'}}>⚠️ Erro</span>}
              {!syncing&&!syncErr&&loaded&&<span style={{fontSize:11,color:C.success}}>✓ Salvo</span>}
              <button onClick={logout} title="Sair"
                style={{background:'transparent',border:'1px solid '+C.border2,borderRadius:7,padding:'5px 9px',cursor:'pointer',fontSize:11,color:C.muted,fontFamily:'Inter,sans-serif',fontWeight:600}}>
                Sair
              </button>
              <button onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}
                title="Alternar tema claro/escuro"
                style={{background:C.card2,border:'1px solid '+C.border2,borderRadius:9,padding:'7px 10px',cursor:'pointer',fontSize:16,lineHeight:1,flexShrink:0}}>
                {theme==='dark'?'☀️':'🌙'}
              </button>
            </div>
          </div>
          {/* Row 2 — nav tabs, horizontally scrollable */}
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',borderTop:'1px solid '+C.border+'44'}}>
            <div style={{display:'flex',padding:'0 12px',width:'max-content',minWidth:'100%'}}>
              {NAV.map(([t,ic,lb,ct])=>(
                <button key={t} onClick={()=>{if(t!=='generate'){setEditN(null);setEditC(null);}setTab(t);}}
                  style={{padding:'10px 16px',cursor:'pointer',border:'none',background:'transparent',color:tab===t?C.accentL:C.muted,fontWeight:tab===t?700:500,borderBottom:tab===t?'2px solid '+C.accent:'2px solid transparent',fontSize:13,fontFamily:'Inter,sans-serif',transition:'all .2s',display:'inline-flex',alignItems:'center',gap:5,whiteSpace:'nowrap'}}>
                  {ic} {lb}
                  {ct!==null&&<span style={{background:tab===t?C.accent:C.border2,color:tab===t?'#fff':C.muted,borderRadius:100,padding:'0 6px',fontSize:11,fontWeight:800,lineHeight:'18px'}}>{ct}</span>}
                </button>
              ))}
            </div>
          </div>
        </header>

        {/* ─── Content ─────────────────────────────────────────────────── */}
        <main style={{maxWidth:900,margin:'0 auto',padding:'24px 14px',width:'100%'}}>

          {/* ══ NICHOS LIST ═══════════════════════════════════════════════ */}
          {tab==='nichos'&&!editN&&(
            <div className="fade">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:22,flexWrap:'wrap',gap:10}}>
                <div><h1 style={{fontSize:22,fontWeight:900,letterSpacing:'-.02em'}}>Nichos</h1><p style={{color:C.muted,fontSize:14,marginTop:4}}>Conjunto de workflows por tipo de automação.</p></div>
                <Btn onClick={()=>setEditN(EMPTY_NICHO())}>➕ Novo Nicho</Btn>
              </div>
              {!loaded&&<div style={{textAlign:'center',padding:70,color:C.muted}}>Carregando...</div>}
              {loaded&&nichos.length===0&&empty('📦','Nenhum nicho criado','Crie um nicho para organizar seus clientes.',<Btn onClick={()=>setEditN(EMPTY_NICHO())}>➕ Criar Primeiro Nicho</Btn>)}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:14}}>
                {nichos.map(n=>{
                  const nc2=clients.filter(c=>c.set_id===n.id).length;
                  const lf=n.workflowFiles.filter(w=>n.files[w.key]).length;
                  const tot=n.workflowFiles.length;
                  const pct=tot>0?Math.round(lf/tot*100):0;
                  return(
                    <Card key={n.id} hover style={{padding:0,overflow:'hidden',border:'1px solid '+(pct===100&&tot>0?n.color+'55':C.border2)}}>
                      {/* Progress bar top */}
                      <div style={{height:4,background:C.border2}}><div style={{height:4,background:n.color,width:pct+'%',transition:'width .5s'}}/></div>
                      <div style={{padding:'16px 16px 14px'}}>
                        <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:14}}>
                          <div style={{width:44,height:44,borderRadius:10,background:n.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{n.icon}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <h3 style={{fontSize:14,fontWeight:800,marginBottom:5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.nome||'Sem nome'}</h3>
                            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                              <Badge color={n.color}>{n.versao}</Badge>
                              {pct===100&&tot>0?<Badge color={C.success}>✓</Badge>:<Badge color={C.warn}>{lf}/{tot}</Badge>}
                            </div>
                          </div>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                          <div style={{background:C.card2,borderRadius:9,padding:'9px 12px'}}><p style={{fontSize:20,fontWeight:900,lineHeight:1}}>{nc2}</p><p style={{fontSize:11,color:C.muted,marginTop:2}}>clientes</p></div>
                          <div style={{background:C.card2,borderRadius:9,padding:'9px 12px'}}><p style={{fontSize:20,fontWeight:900,lineHeight:1}}>{tot}</p><p style={{fontSize:11,color:C.muted,marginTop:2}}>workflows</p></div>
                        </div>
                        <div style={{display:'flex',gap:6}}>
                          <Btn sm variant="secondary" onClick={()=>setEditN(JSON.parse(JSON.stringify(n)))}>✏️ Editar</Btn>
                          <Btn sm variant="success" onClick={()=>setTab('generate')}>⬇️ Gerar</Btn>

            <div className="fade">

            </div>

          {/* ══ CLIENTS LIST ══════════════════════════════════════════════ */}

            <div className="fade">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:18,flexWrap:'wrap',gap:10}}>
                <div><h1 style={{fontSize:22,fontWeight:900,letterSpacing:'-.02em'}}>Clientes</h1><p style={{color:C.muted,fontSize:14,marginTop:4}}>Cada cliente está vinculado a um nicho.</p></div>
                <Btn onClick={()=>setEditC(EMPTY_CLIENT())}>➕ Novo Cliente</Btn>
              </div>
              {nichos.length>0&&(
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:18}}>
                  <PillTab active={filterN===''} onClick={()=>setFilterN('')} count={clients.length}>Todos</PillTab>
                  {nichos.map(n=><PillTab key={n.id} active={filterN===n.id} onClick={()=>setFilterN(n.id)} count={clients.filter(c=>c.set_id===n.id).length}>{n.icon} {n.nome}</PillTab>)}
                </div>
              )}
              {!loaded&&<div style={{textAlign:'center',padding:70,color:C.muted}}>Carregando...</div>}
              {loaded&&filteredClients.length===0&&empty('👥','Nenhum cliente','Crie um nicho e adicione clientes.',nichos.length>0?<Btn onClick={()=>setEditC(EMPTY_CLIENT())}>➕ Adicionar Cliente</Btn>:null)}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>
                {filteredClients.map(c=>{
                  const n=nichos.find(x=>x.id===c.set_id);
                  return(
                    <Card key={c.id} hover style={{border:'1px solid '+(n?n.color+'44':C.border2),padding:0,overflow:'hidden'}}>
                      <div style={{height:3,background:n?n.color:C.border2}}/>
                      <div style={{padding:'13px 14px'}}>
                        <div style={{display:'flex',gap:9,marginBottom:11}}>
                          <div style={{width:38,height:38,borderRadius:9,background:n?n.color+'22':C.card2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{n?.icon||'🏥'}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <h3 style={{fontSize:13,fontWeight:800,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.clinica_nome||'Sem nome'}</h3>
                            <p style={{fontSize:11,color:C.muted,marginTop:2}}>{n?n.nome:'⚠️ Sem nicho'}</p>
                          </div>
                        </div>
                        <div style={{display:'flex',gap:6}}>
                          <Btn sm variant="secondary" onClick={()=>setEditC(JSON.parse(JSON.stringify(c)))}>⚙️ Editar</Btn>
                          <Btn sm variant="danger" onClick={()=>delC(c.id)}>✕</Btn>
                        </div>
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>
          )}

          {/* ══ CLIENT EDIT ═══════════════════════════════════════════════ */}
          {tab==='clients'&&editC&&(
            <div className="fade">
              {back('Clientes',()=>setEditC(null))}
              <h1 style={{fontSize:21,fontWeight:900,letterSpacing:'-.02em',marginBottom:20}}>{clients.find(c=>c.id===editC.id)?'Editar Cliente':'Novo Cliente'}</h1>
              <Card><ClientForm client={editC} nichos={nichos} onChange={setEditC} onSave={()=>saveC(editC)} onCancel={()=>setEditC(null)}/></Card>
            </div>
          )}

          {/* ══ GENERATE ══════════════════════════════════════════════════ */}
          {tab==='generate'&&(
            <div className="fade">
              <h1 style={{fontSize:22,fontWeight:900,letterSpacing:'-.02em',marginBottom:4}}>Gerar ZIP</h1>
              <p style={{color:C.muted,fontSize:14,marginBottom:20}}>Selecione nicho e clientes para gerar os workflows configurados.</p>
              <Card><GenerateTab nichos={nichos} clients={clients}/></Card>
            </div>
          )}

        </main>
      </div>
    </TC.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrBound><App/></ErrBound>);
</script></body></html>
